<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">
    <header class="header">
      <h1 class="logo">🍅 Pomodoro</h1>
      <button class="settings-btn" id="settingsBtn" aria-label="Settings">⚙</button>
    </header>

    <!-- Settings Panel -->
    <div class="settings-panel hidden" id="settingsPanel">
      <h2>Settings</h2>
      <div class="setting-row">
        <label for="workDuration">Work (minutes)</label>
        <input type="number" id="workDuration" min="1" max="60" value="25" />
      </div>
      <div class="setting-row">
        <label for="shortBreak">Short Break (minutes)</label>
        <input type="number" id="shortBreak" min="1" max="30" value="5" />
      </div>
      <div class="setting-row">
        <label for="longBreak">Long Break (minutes)</label>
        <input type="number" id="longBreak" min="5" max="60" value="15" />
      </div>
      <div class="setting-row">
        <label for="longBreakAfter">Long break after (sessions)</label>
        <input type="number" id="longBreakAfter" min="1" max="10" value="4" />
      </div>
      <button class="btn-save" id="saveSettings">Save</button>
    </div>

    <!-- Mode Tabs -->
    <nav class="mode-tabs">
      <button class="tab active" data-mode="work">Work</button>
      <button class="tab" data-mode="short">Short Break</button>
      <button class="tab" data-mode="long">Long Break</button>
    </nav>

    <!-- Task Input -->
    <div class="task-section">
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="What are you working on?"
        maxlength="80"
      />
    </div>

    <!-- Timer -->
    <div class="timer-wrapper">
      <svg class="progress-ring" viewBox="0 0 220 220" aria-hidden="true">
        <circle class="ring-bg" cx="110" cy="110" r="98" />
        <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="98" />
      </svg>
      <div class="timer-display">
        <span class="time" id="timeDisplay">25:00</span>
        <span class="mode-label" id="modeLabel">Focus Time</span>
      </div>
    </div>

    <!-- Session Dots -->
    <div class="sessions" id="sessionsContainer" aria-label="Session progress"></div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-icon" id="resetBtn" aria-label="Reset timer">↺</button>
      <button class="btn-primary" id="startBtn">Start</button>
      <button class="btn-icon" id="skipBtn" aria-label="Skip to next">⏭</button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="completedSessions">0</span>
        <span class="stat-label">Sessions today</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalMinutes">0</span>
        <span class="stat-label">Minutes focused</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
